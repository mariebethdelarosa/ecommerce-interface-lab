<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Checkout - ENHYPEN Merch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ENHYPEN Merch - Checkout</h1>
    <nav>
        <ul>
            <li><a href="landingpage.html">Home</a></li>
            <li><a href="cart.html">Cart</a></li>
        </ul>
    </nav>
</header>

<div class="checkout-layout">

    <div class="checkout-forms">

        <section>
            <h2>Shipping Information</h2>
            <form>
                <fieldset>
                    <legend>Shipping Address</legend>
                    <label>Full Name:</label>
                    <input type="text" required>

                    <label>Street Address:</label>
                    <input type="text" required>

                    <label>Zip Code:</label>
                    <input type="text" required>
                </fieldset>
            </form>
        </section>

        <section>
            <h2>Payment Method</h2>
            <form>
                <label><input type="radio" name="payment" required> Credit Card</label>
                <label><input type="radio" name="payment"> PayPal</label>
                <button type="submit">Place Order</button>
            </form>
        </section>

    </div>

    <aside class="order-summary">
        <h2>Order Summary</h2>
        <p>Items: <span class="price">1200</span></p>
        <p>Shipping: <span class="price">100</span></p>
        <p><strong>Total: <span class="price">1300</span></strong></p>
    </aside>

</div>

</body>
</html>
