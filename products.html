<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products - ENHYPEN Merch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>ENHYPEN Merch - Products</h1>
</header>

<main>
    <section>
        <article>
            <img src="album.jpg" alt="Dark Blood Album" width="200" height="300">
            <h2>Dark Blood Album</h2>
            <p class="price">1200</p>
            <a href="detail.html">View Details</a>
        </article>

        <article>
            <img src="keychain.jpg" alt="Logo Keychain" width="200" height="300">
            <h2>Logo Keychain</h2>
            <p class="price">300</p>
            <a href="detail.html">View Details</a>
        </article>
    </section>
</main>

<aside>
    <h2>Filter Products</h2>
    <form>
        <fieldset>
            <legend>Category</legend>
            <label><input type="checkbox" name="category" value="album"> Album</label>
            <label><input type="checkbox" name="category" value="apparel"> Apparel</label>
        </fieldset>

        <fieldset>
            <legend>Price Range</legend>
            <label><input type="radio" name="price" value="low"> Below ₱2,000</label>
            <label><input type="radio" name="price" value="high"> Above ₱2,000</label>
        </fieldset>
    </form>
</aside>

</body>
</html>
